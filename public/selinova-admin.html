<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SELINOVA · Admin Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #030305; color: #f0f0f0; }
        .panel { background: #0a0a0e; border: 1px solid rgba(255,255,255,0.07); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-7xl mx-auto space-y-6">
        <div class="panel p-6 rounded-2xl flex justify-between items-center border-purple-500/20">
            <div>
                <h1 class="text-2xl font-bold text-white">HQ Admin Console</h1>
                <p class="text-xs text-purple-400">Global Infrastructure Control Node</p>
            </div>
            <button onclick="loadAllAdminData()" class="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-4 rounded-xl text-xs transition-colors">
                <i class="fas fa-sync-alt mr-2"></i> Cloud-Sync aktualisieren
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
            <div class="panel p-5 rounded-xl text-center">
                <span class="text-[10px] text-neutral-500 block">TOTAL LEADS IN CLOUD</span>
                <span id="kpi-total" class="text-2xl font-bold text-white">0</span>
            </div>
            <div class="panel p-5 rounded-xl text-center">
                <span class="text-[10px] text-neutral-500 block">BEARBEITET (IN PROGRESS)</span>
                <span id="kpi-progress" class="text-2xl font-bold text-purple-400">0</span>
            </div>
            <div class="panel p-5 rounded-xl text-center">
                <span class="text-[10px] text-neutral-500 block">CONVERTED (SUCCESS)</span>
                <span id="kpi-closed" class="text-2xl font-bold text-emerald-400">0</span>
            </div>
        </div>

        <div class="panel p-6 rounded-2xl">
            <h3 class="text-sm font-bold text-neutral-400 uppercase tracking-wider mb-4">Live Pipeline Monitor</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead>
                        <tr class="border-b border-neutral-800 text-neutral-500">
                            <th class="pb-3">ID</th>
                            <th class="pb-3">Name</th>
                            <th class="pb-3">Zugeordneter Agent</th>
                            <th class="pb-3">CRM Status</th>
                            <th class="pb-3">Letzter Anruf</th>
                            <th class="pb-3">Aktion</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body" class="divide-y divide-neutral-900 text-neutral-300">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lzqerupigfyorsdbmjtc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hXNSoqqK9VYXqYKEI8ltjg_qNnz5Mnw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadAllAdminData() {
            try {
                const { data: leads, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .order('id', { ascending: true });

                if (error) throw error;

                // Update KPIs
                document.getElementById('kpi-total').textContent = leads.length;
                document.getElementById('kpi-progress').textContent = leads.filter(l => l.lead_status === 'In Progress' || l.lead_status === 'Follow-up').length;
                document.getElementById('kpi-closed').textContent = leads.filter(l => l.lead_status === 'Closed').length;

                // Render Table
                const tbody = document.getElementById('admin-table-body');
                tbody.innerHTML = '';

                leads.forEach(lead => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-neutral-900/40 transition-colors";
                    tr.innerHTML = `
                        <td class="py-3 font-bold text-neutral-500">#${lead.id}</td>
                        <td class="py-3 font-bold text-white">${lead.name}</td>
                        <td class="py-3">
                            <select onchange="reassignLeadAgent(${lead.id}, this.value)" class="bg-neutral-900 border border-neutral-800 p-1 rounded text-neutral-300 text-[11px]">
                                <option value="DANYVITO" ${lead.assigned_agent === 'DANYVITO' ? 'selected' : ''}>DANYVITO</option>
                                <option value="AGENT007" ${lead.assigned_agent === 'AGENT007' ? 'selected' : ''}>AGENT007</option>
                                <option value="UNASSIGNED" ${lead.assigned_agent === 'UNASSIGNED' ? 'selected' : ''}>UNASSIGNED</option>
                            </select>
                        </td>
                        <td class="py-3">
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold ${lead.lead_status === 'Closed' ? 'bg-emerald-500/10 text-emerald-400' : lead.lead_status === 'In Progress' ? 'bg-purple-500/10 text-purple-400' : 'bg-neutral-800 text-neutral-400'}">
                                ${lead.lead_status || 'Open'}
                            </span>
                        </td>
                        <td class="py-3 text-neutral-500 text-[11px]">${lead.last_called_at ? new Date(lead.last_called_at).toLocaleString('de-DE') : 'Nie'}</td>
                        <td class="py-3"><button onclick="alert('Notizen: ${lead.notes || 'Keine vorhanden'}')" class="text-neutral-400 hover:text-white"><i class="fas fa-eye"></i> Logs</button></td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Admin Synchronisationsfehler:", err.message);
            }
        }

        async function reassignLeadAgent(leadId, newAgent) {
            try {
                const { error } = await supabaseClient
                    .from('leads')
                    .update({ assigned_agent: newAgent })
                    .eq('id', leadId);

                if (error) throw error;
                console.log(`Lead #${leadId} wurde erfolgreich an ${newAgent} übergeben.`);
            } catch (err) {
                alert('Zuweisung fehlgeschlagen: ' + err.message);
            }
        }

        window.onload = loadAllAdminData;
    </script>
</body>
</html>
