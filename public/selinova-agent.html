<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SELINOVA · Agent Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'JetBrains Mono', monospace; background-color: #040404; color: #f0f0f0; }
        .panel { background: #0a0a0c; border: 1px solid rgba(255,255,255,0.08); }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto space-y-6">
        <div class="panel p-6 rounded-2xl flex justify-between items-center">
            <div>
                <h2 class="text-xl font-bold text-white">Selinova Agenten-Terminal</h2>
                <p id="agent-display" class="text-xs text-emerald-400">Identität: Lädt...</p>
            </div>
            <span class="px-3 py-1 bg-emerald-500/10 text-emerald-400 text-xs rounded-full border border-emerald-500/20">Supabase Connected</span>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="panel p-4 rounded-2xl md:col-span-1 space-y-3">
                <h3 class="text-sm font-bold text-neutral-400 uppercase tracking-wider mb-2">Lead Pool</h3>
                <div id="leads-list" class="space-y-2 overflow-y-auto max-h-[500px]">
                    </div>
            </div>
            <div id="active-lead-panel" class="panel p-6 rounded-2xl md:col-span-2 space-y-4">
                <p class="text-neutral-500 text-sm">Wähle links einen Lead aus der Datenbank aus, um das Dial-HUD zu starten.</p>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://lzqerupigfyorsdbmjtc.supabase.co";
        const SUPABASE_KEY = "sb_publishable_hXNSoqqK9VYXqYKEI8ltjg_qNnz5Mnw";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentLeads = [];
        let selectedLead = null;
        const currentAgent = localStorage.getItem('selinova_agent') || 'DANYVITO';

        async function initAgentApp() {
            document.getElementById('agent-display').textContent = `Identität: Agent ${currentAgent}`;
            await fetchLeads();
        }

        async function fetchLeads() {
            try {
                const { data, error } = await supabaseClient
                    .from('leads')
                    .select('*')
                    .eq('assigned_agent', currentAgent)
                    .order('id', { ascending: true });

                if (error) throw error;
                currentLeads = data || [];
                renderLeadsList();
            } catch (err) {
                console.error("Fehler beim Laden:", err.message);
            }
        }

        function renderLeadsList() {
            const container = document.getElementById('leads-list');
            container.innerHTML = '';
            if (currentLeads.length === 0) {
                container.innerHTML = '<p class="text-xs text-neutral-600 p-2">Keine Leads zugewiesen.</p>';
                return;
            }
            currentLeads.forEach(lead => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl border cursor-pointer transition-all ${selectedLead?.id === lead.id ? 'bg-emerald-500/10 border-emerald-500' : 'bg-neutral-900/50 border-neutral-800 hover:border-neutral-700'}`;
                div.innerHTML = `
                    <div class="text-xs font-bold text-white">${lead.name}</div>
                    <div class="text-[10px] text-neutral-400 mt-1">${lead.address || 'Keine Adresse'}</div>
                    <div class="flex justify-between items-center mt-2 text-[9px]">
                        <span class="px-1.5 py-0.5 rounded bg-neutral-800 text-neutral-300">${lead.lead_status || 'Open'}</span>
                        <span class="text-neutral-500">★ ${lead.rating || '0.0'}</span>
                    </div>
                `;
                div.onclick = () => selectLead(lead);
                container.appendChild(div);
            });
        }

        function selectLead(lead) {
            selectedLead = lead;
            renderLeadsList();
            const panel = document.getElementById('active-lead-panel');
            panel.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <h2 class="text-xl font-bold text-white">${lead.name}</h2>
                        <p class="text-xs text-neutral-400 mt-1"><i class="fas fa-map-marker-alt"></i> ${lead.address || 'Nicht verfügbar'}</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 bg-neutral-900/30 p-4 rounded-xl border border-neutral-800">
                        <div>
                            <span class="text-[10px] text-neutral-500 block">KATEGORIE</span>
                            <span class="text-xs font-bold text-white">${lead.category || 'Restaurant'}</span>
                        </div>
                        <div>
                            <span class="text-[10px] text-neutral-500 block">STATUS IN MAPS</span>
                            <span class="text-xs font-bold text-emerald-400">${lead.opening_status || 'Unbekannt'}</span>
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">CRM Status bearbeiten</label>
                        <select id="crm-status" class="bg-neutral-900 border border-neutral-800 p-2 rounded-lg text-xs text-white w-full">
                            <option value="Open" ${lead.lead_status === 'Open' ? 'selected' : ''}>Open (Unbearbeitet)</option>
                            <option value="In Progress" ${lead.lead_status === 'In Progress' ? 'selected' : ''}>In Progress (In Verhandlung)</option>
                            <option value="Follow-up" ${lead.lead_status === 'Follow-up' ? 'selected' : ''}>Follow-up (Wiedervorlage)</option>
                            <option value="Closed" ${lead.lead_status === 'Closed' ? 'selected' : ''}>Closed (Erfolgreich abgeschlossen)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] text-neutral-400 uppercase tracking-wider block mb-1">Gesprächsnotizen / Logs</label>
                        <textarea id="crm-notes" class="bg-neutral-900 border border-neutral-800 p-3 rounded-xl text-xs text-white w-full h-24" placeholder="Ergebnis des Telefonats eintragen...">${lead.notes || ''}</textarea>
                    </div>
                    <button onclick="saveLeadChanges()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-2.5 px-4 rounded-xl text-xs transition-colors shadow-lg">
                        <i class="fas fa-save mr-2"></i> Änderungen in Supabase Cloud sichern
                    </button>
                </div>
            `;
        }

        async function saveLeadChanges() {
            if (!selectedLead) return;
            const newStatus = document.getElementById('crm-status').value;
            const newNotes = document.getElementById('crm-notes').value;

            try {
                const { error } = await supabaseClient
                    .from('leads')
                    .update({
                        lead_status: newStatus,
                        notes: newNotes,
                        last_called_at: new Date().toISOString()
                    })
                    .eq('id', selectedLead.id);

                if (error) throw error;
                alert('✓ Änderungen in Echtzeit mit Supabase synchronisiert!');
                await fetchLeads();
                selectedLead = currentLeads.find(l => l.id === selectedLead.id);
            } catch (err) {
                alert('Fehler beim Speichern: ' + err.message);
            }
        }

        window.onload = initAgentApp;
    </script>
</body>
</html>
